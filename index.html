<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DB Services</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Poppins', sans-serif; background: #0a0a0a; color: white; }

    header { text-align: center; padding: 40px 20px; animation: fadeDown 1s ease; }
    header h1 { font-size: 3rem; }
    header p { color: #aaa; margin-top: 10px; }

    .services {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: #111;
      border-radius: 16px;
      overflow: hidden;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      animation: fadeUp 1s ease;
    }

    .card:hover { transform: scale(1.05); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    .card img { width: 100%; height: 160px; object-fit: cover; }
    .card-content { padding: 15px; }
    .card h2 { font-size: 1.3rem; }
    .card p { color: #bbb; font-size: 0.9rem; margin-top: 5px; }

    .price { color: #00ff99; font-weight: bold; margin-top: 10px; }

    .contact {
      max-width: 700px;
      margin: 40px auto;
      background: #111;
      padding: 20px;
      border-radius: 16px;
      animation: fadeUp 1.2s ease;
      text-align: center;
    }

    .buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 20px;
    }

    button {
      background: #00ff99;
      border: none;
      padding: 10px 16px;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.3s;
      font-weight: bold;
    }

    button:hover { background: #00cc77; }

    iframe {
      width: 100%;
      height: 600px;
      border: none;
      border-radius: 10px;
    }

    footer { text-align: center; color: #777; padding: 20px; }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <header>
    <h1>DB Services</h1>
    <p>Fast, reliable, affordable services</p>
  </header>

  <section class="services">

    <div class="card">
      <img src="https://via.placeholder.com/300">
      <div class="card-content">
        <h2>Lawn Mowing</h2>
        <p>Keep your yard clean and fresh.</p>
        <div class="price">$20 - $50</div>
      </div>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/300">
      <div class="card-content">
        <h2>Car Washing</h2>
        <p>Make your car shine like new.</p>
        <div class="price">$15 - $40</div>
      </div>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/300">
      <div class="card-content">
        <h2>Basic Coding Help</h2>
        <p>Websites, scripts, and small tools.</p>
        <div class="price">$10 - $30</div>
      </div>
    </div>

  </section>

  <section class="contact">
    <h2>Book a Job</h2>

    <div class="buttons">
      <button onclick="window.location.href='https://forms.gle/YOUR_FORM_LINK'">
        Book via Form
      </button>

      <button onclick="window.location.href='tel:0212345678'">
        Call Me
      </button>

      <button onclick="window.location.href='mailto:your@email.com'">
        Email Me
      </button>
    </div>

    <!-- Embedded Google Form -->
    <iframe src="https://forms.gle/YOUR_FORM_LINK"></iframe>

  </section>

  <footer>
    © 2026 DB Services
  </footer>

</body>
</html>
